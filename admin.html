<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Device ID</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #ccc;
            font-family: 'Courier New', monospace;
            padding: 20px;
        }
        h1 {
            color: #00f0ff;
            text-shadow: 0 0 20px #00f0ff44;
            border-bottom: 1px solid #00f0ff33;
            padding-bottom: 10px;
        }
        .stats {
            display: flex;
            gap: 30px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .stats span {
            background: #111128;
            padding: 8px 18px;
            border-radius: 30px;
            border: 1px solid #333366;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #1a1a3a;
        }
        th {
            color: #a855f7;
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }
        td {
            font-size: 14px;
            word-break: break-all;
        }
        .id-highlight {
            color: #00f0ff;
            font-weight: bold;
        }
        .btn {
            background: #1a1a3a;
            border: none;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            margin: 5px 5px 0 0;
            font-family: inherit;
        }
        .btn:hover {
            background: #2a2a5a;
        }
        .footer {
            margin-top: 40px;
            color: #444;
            font-size: 12px;
            text-align: center;
        }
        .live-badge {
            color: #00ff88;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .danger {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <h1>🕵️ DEVICE ID LOGGER <span class="live-badge">● LIVE</span></h1>
    <div class="stats">
        <span>📱 Total perangkat: <strong id="count">0</strong></span>
        <span>🕒 Update terakhir: <strong id="lastTime">-</strong></span>
    </div>
    <button class="btn" onclick="exportCSV()">⬇️ Export CSV</button>
    <button class="btn" onclick="location.reload()">🔄 Refresh</button>

    <table>
        <thead>
            <tr>
                <th>#</th>
                <th>Device ID</th>
                <th>Waktu</th>
                <th>Platform</th>
                <th>Screen</th>
                <th>User Agent</th>
            </tr>
        </thead>
        <tbody id="dataBody">
            <tr><td colspan="6" style="text-align:center; color:#555;">⏳ Loading data...</td></tr>
        </tbody>
    </table>
    <div class="footer">⚠️ <span class="danger">PUBLIC MODE</span> — data real-time dari Firebase Realtime Database</div>

    <script type="importmap">
    {
        "imports": {
            "firebase/app": "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, onValue } from 'firebase/database';

        // CONFIG LO
        const firebaseConfig = {
            apiKey: "AIzaSyAKk8yOBe0AJbu9krI0DigvIJpATFWXezE",
            authDomain: "stealth-c7df6.firebaseapp.com",
            databaseURL: "https://stealth-c7df6-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "stealth-c7df6",
            storageBucket: "stealth-c7df6.firebasestorage.app",
            messagingSenderId: "167464139264",
            appId: "1:167464139264:web:62b093af1066bf8084b6e5",
            measurementId: "G-0VE28H406J"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dataRef = ref(db, 'devices');

        function renderTable(data) {
            const tbody = document.getElementById('dataBody');
            const count = document.getElementById('count');
            const lastTime = document.getElementById('lastTime');

            if (!data) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#555;">Belum ada data</td></tr>';
                count.textContent = '0';
                lastTime.textContent = '-';
                return;
            }

            const entries = Object.values(data);
            count.textContent = entries.length;

            if (entries.length > 0) {
                const last = entries[entries.length - 1];
                lastTime.textContent = new Date(last.time).toLocaleString('id-ID');
            }

            let html = '';
            entries.slice().reverse().forEach((item, idx) => {
                html += `<tr>
                    <td>${idx + 1}</td>
                    <td class="id-highlight">${item.id || 'N/A'}</td>
                    <td>${item.time ? new Date(item.time).toLocaleString('id-ID') : '-'}</td>
                    <td>${item.platform || '-'}</td>
                    <td>${item.screen || '-'}</td>
                    <td style="font-size:11px; color:#888;">${(item.userAgent || '').substring(0, 50)}...</td>
                </tr>`;
            });
            tbody.innerHTML = html;
        }

        // Real-time listener
        onValue(dataRef, (snapshot) => {
            const data = snapshot.val();
            renderTable(data);
        }, (error) => {
            console.error('Error baca data:', error);
            document.getElementById('dataBody').innerHTML = 
                '<tr><td colspan="6" style="text-align:center; color:#ff4444;">❌ Gagal konek ke Firebase. Cek rules! Harus true.</td></tr>';
        });

        // Export CSV
        window.exportCSV = function() {
            const tbody = document.getElementById('dataBody');
            const rows = tbody.querySelectorAll('tr');
            if (rows.length === 0 || rows[0].textContent.includes('Belum ada') || rows[0].textContent.includes('Gagal')) {
                alert('Tidak ada data buat di-export!');
                return;
            }

            let csv = 'Device ID,Waktu,Platform,Screen,User Agent\n';
            rows.forEach(row => {
                const cols = row.querySelectorAll('td');
                if (cols.length === 6) {
                    const id = cols[1].textContent;
                    const time = cols[2].textContent;
                    const platform = cols[3].textContent;
                    const screen = cols[4].textContent;
                    const ua = cols[5].textContent.replace(/,/g, '');
                    csv += `"${id}","${time}","${platform}","${screen}","${ua}"\n`;
                }
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `device_ids_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        };
    </script>
</body>
</html>
